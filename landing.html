<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUCKY#s</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Lato:wght@300;400;700&family=Roboto+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="landing-wrap">
    <div class="landing-card">
      <div class="landing-eyebrow">Members Only</div>
      <h1>LUCKY Predictions</h1>
      <p>Enter password to continue</p>
      <form class="landing-form" id="login-form">
        <input type="password" id="password" name="password" placeholder="Password" autocomplete="current-password" required>
        <span id="login-error" class="landing-error" hidden>Incorrect password</span>
        <button type="submit">Enter</button>
      </form>
    </div>
  </div>

  <script>
    const SITE_PASSWORD = "RealFreePicks";

    const passwordInput = document.getElementById('password');
    const loginError = document.getElementById('login-error');

    document.getElementById('login-form').addEventListener('submit', function (e) {
      e.preventDefault();

      if (passwordInput.value === SITE_PASSWORD) {
        window.location.href = 'dashboard.html';
        return;
      }

      loginError.hidden = false;
      passwordInput.value = '';
      passwordInput.focus();
    });
  </script>
</body>
</html>
